<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KN-Space</title>

<link rel="manifest" href="/manifest.webmanifest" />
<!-- Trình duyệt desktop (đặc biệt Chrome/Safari) ưu tiên icon nhỏ 16/32px cho tab — chỉ khai
     báo icon192.png không đủ, nhiều trường hợp rơi về icon globe mặc định. Khai báo đủ size. -->
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon16.png" />
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon192.png" />
<meta name="theme-color" content="#5457d6" />

<!-- "Add to Home Screen" trên iOS Safari KHÔNG đọc manifest.webmanifest (chỉ Android/Chrome
     đọc) — cần khai báo riêng các meta apple-* này để full-screen thật (ẩn thanh Safari) và có
     icon đúng khi ghim vào màn hình chính. -->
<link rel="apple-touch-icon" href="/icons/icon180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="KN-Space" />
</head>
<body data-theme="light">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
